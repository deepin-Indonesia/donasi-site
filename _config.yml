# deepin Indonesia — Donasi Site
# Domain: donasi.deepin.id
# Deploy: Netlify (preview) / GitHub Pages (main)

title: "Donasi deepin Indonesia"
tagline: "Dukung Komunitas deepin Indonesia"
description: >-
  Dukung pengembangan komunitas deepin Indonesia. Donasi Anda membantu menjaga server,
  mengadakan event, membuat konten, dan mengembangkan ekosistem deepin di Indonesia.
url: "https://donasi.deepin.id"
email: "deepin@siberin.id"

# Gunakan tema bersama dari _theme (submodule)
layouts_dir: _theme/_layouts
includes_dir: _theme/_includes

sass:
  style: compressed
  load_paths:
    - _theme/assets/css

# SEO
locale: id_ID
google_analytics: G-2J4TLB9W7H

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitmodules
  - vendor
  - node_modules
